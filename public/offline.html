<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – JSC MECH FAB LLP ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    .brand {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin: 0 0 0.75rem;
      color: #0f172a;
    }

    p {
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #fef3c7;
      border: 1px solid #fde68a;
      color: #92400e;
      border-radius: 9999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 0.65rem 1.5rem;
      border-radius: 0.625rem;
      border: none;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }

    .note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <p class="brand">JSC MECH FAB LLP · Manufacturing Control</p>
    <h1>You're Offline</h1>
    <div class="badge">
      <span>⚠</span> No Internet Connection
    </div>
    <p>
      JSC ERP requires an active internet connection to securely load live
      production data, project timelines, and procurement records.
    </p>
    <button onclick="window.location.reload()">
      ↺ Try Again
    </button>
    <p class="note">
      For security, no project data is stored offline.
      Reconnect to continue working.
    </p>
  </div>
</body>
</html>
